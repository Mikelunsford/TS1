# Supabase local configuration for the Team1 Wave 0 build.
# Project ref: ozvanymuzaqbexchuoxz
# Auth: email+password, signup enabled, JWT 3600s, refresh-token rotation on.
# Storage: enabled, 50 MiB file size limit.
# API exposes schemas public and graphql_public.
# Every Edge Function bundle is registered with verify_jwt = true EXCEPT
# tenants-api, which serves public host-resolve and must be unauthenticated.

project_id = "ozvanymuzaqbexchuoxz"

[api]
enabled = true
port = 54421
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54422
shadow_port = 54420
major_version = 15

[db.pooler]
enabled = false
port = 54429
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = false

[studio]
enabled = true
port = 54423
api_url = "http://localhost:54421"

[inbucket]
enabled = true
port = 54424
smtp_port = 54425
pop3_port = 54426

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = true }

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"

[edge_runtime]
enabled = true
inspector_port = 8083

[analytics]
enabled = false

# Function bundles. tenants-api is intentionally public (host resolution).

[functions.tenants-api]
verify_jwt = false
import_map = "./functions/_shared/import_map.json"

[functions.auth-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.quotes-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.crm-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.dashboard-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.invoicing-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.projects-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.ops-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.finance-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.inventory-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.vendors-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.settings-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"

[functions.exports-api]
verify_jwt = true
import_map = "./functions/_shared/import_map.json"
