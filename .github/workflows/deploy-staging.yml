name: Deploy staging (Vercel)

on:
  push:
    branches: [main]

jobs:
  staging:
    name: Promote to staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Pull Vercel env (preview)
        run: pnpm dlx vercel@34 pull --yes --environment=preview --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: pnpm dlx vercel@34 build --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to staging alias
        run: |
          url=$(pnpm dlx vercel@34 deploy --prebuilt --token "${{ secrets.VERCEL_TOKEN }}")
          pnpm dlx vercel@34 alias set "$url" "${{ secrets.STAGING_ALIAS }}" --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
