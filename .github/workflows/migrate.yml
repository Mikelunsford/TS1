name: Apply migrations

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
  workflow_dispatch:

# Manual approval gate on the environment 'production-db'.
# Configure the environment in repo Settings → Environments with required reviewers.

jobs:
  push-migrations:
    name: supabase db push
    runs-on: ubuntu-latest
    environment: production-db
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.180.0

      # GitHub Actions runners are IPv4-only; the direct DB hostname
      # `db.<ref>.supabase.co` resolves to IPv6 in most regions. Route
      # through the IPv4 pooler (session mode on :5432) for migrations.
      # `supabase link` probes the IPv6 host itself and aborts the job
      # before --db-url-based steps can run, so we skip linking — passing
      # --db-url on every step is sufficient.
      # https://supabase.com/docs/guides/troubleshooting/network-restrictions

      - name: List pending migrations
        run: |
          supabase migration list \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_REF }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-1-us-west-2.pooler.supabase.com:6543/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations (forward-only)
        run: |
          supabase db push \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_REF }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-1-us-west-2.pooler.supabase.com:6543/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify final migration count
        run: |
          supabase migration list \
            --db-url "postgresql://postgres.${{ secrets.SUPABASE_PROJECT_REF }}:${{ secrets.SUPABASE_DB_PASSWORD }}@aws-1-us-west-2.pooler.supabase.com:6543/postgres"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
