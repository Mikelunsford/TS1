name: Deploy production (Vercel)

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  prod:
    name: Promote to production
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Pull Vercel env (production)
        run: pnpm dlx vercel@34 pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build (prod)
        run: pnpm dlx vercel@34 build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to production
        run: pnpm dlx vercel@34 deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
