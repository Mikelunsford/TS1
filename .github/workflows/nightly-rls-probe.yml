name: Nightly RLS probe

# Wave 1 enabled the schedule. The spec at apps/web/playwright/rls-probe.spec.ts
# now creates two ephemeral users + orgs via the service role, probes
# cross-tenant access, and tears down. Requires the `staging` environment
# to provide STAGING_SUPABASE_URL, STAGING_SUPABASE_ANON_KEY, and
# STAGING_SUPABASE_SERVICE_ROLE_KEY. Without those the spec skips with a
# clear message — green gate with zero false positives, not green from
# silently doing nothing.
#
# Run on a fresh staging project, NOT the prod project. The fixture
# creates and deletes rows; pointing it at prod risks contaminating data.

on:
  schedule:
    - cron: '0 9 * * *' # 09:00 UTC daily = 04:00 ET / 02:00 MT
  workflow_dispatch:

jobs:
  probe:
    name: Cross-tenant RLS probe against staging
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: Probe env sanity
        run: |
          echo "url_len=${#VITE_SUPABASE_URL}"
          echo "anon_len=${#VITE_SUPABASE_ANON_KEY}"
          echo "sr_len=${#SUPABASE_SERVICE_ROLE_KEY}"
          echo "url_prefix=${VITE_SUPABASE_URL:0:8}"
        env:
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Run RLS probe
        run: |
          echo "RLS step: url_len=${#VITE_SUPABASE_URL} anon_len=${#VITE_SUPABASE_ANON_KEY} sr_len=${#SUPABASE_SERVICE_ROLE_KEY}"
          # Sanity-print the URL char codes to catch hidden chars in the secret.
          node -e 'const u=process.env.VITE_SUPABASE_URL; console.log("[codes]", u && [...u].slice(0,8).map(c=>c.charCodeAt(0)), "len:", u && u.length);'
          pnpm --filter web exec playwright test playwright/rls-probe.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: ${{ secrets.STAGING_URL }}
          VITE_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-rls-report
          path: apps/web/playwright-report
