name: Deploy Edge Functions

# Triggers (R-W2-01 structural fix — Wave 3 PR for F-Wave3-01):
#   1. push to main on functions/config — fires immediately for changes that
#      don't touch migrations.
#   2. workflow_run after migrate.yml completes successfully on main — fires
#      AFTER schema is up to date so coordinated migration+helper PRs deploy
#      the function code only once the matching DDL is live. For commits that
#      touch only migrations (no function delta), this still fires but the
#      `supabase functions deploy` step is a no-op redeploy at the same SHA.
#   3. workflow_dispatch — manual redeploys.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_run:
    workflows: ['Apply migrations']
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: supabase functions deploy
    runs-on: ubuntu-latest
    environment: production-functions
    timeout-minutes: 15
    # When triggered via workflow_run, only fire on the migrate.yml success
    # conclusion. Push + workflow_dispatch always run.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_run, default checkout is the workflow's default branch
          # SHA. Pin to the head_sha that migrate.yml just ran against so the
          # functions we deploy match the migrations that were just applied.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: supabase/setup-cli@v1
        with:
          version: 1.180.0

      - name: Set runtime secrets (idempotent)
        # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY are
        # auto-injected by the platform; we only need the custom ones.
        # Phase 19 (Wave 10 Session 3) — owns this block.
        # Email providers + notifications-worker shared secret. Only the
        # provider whose key is set (RESEND/POSTMARK/SENDGRID/SMTP) actually
        # sends; the others are present-or-empty so the orchestrator can
        # flip providers without re-editing the workflow.
        run: |
          supabase secrets set \
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
            NOTIFICATIONS_WORKER_SECRET="${{ secrets.NOTIFICATIONS_WORKER_SECRET }}" \
            RESEND_API_KEY="${{ secrets.RESEND_API_KEY }}" \
            POSTMARK_API_KEY="${{ secrets.POSTMARK_API_KEY }}" \
            SENDGRID_API_KEY="${{ secrets.SENDGRID_API_KEY }}" \
            SMTP_HOST="${{ secrets.SMTP_HOST }}" \
            SMTP_PORT="${{ secrets.SMTP_PORT }}" \
            SMTP_USER="${{ secrets.SMTP_USER }}" \
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}" \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
        # End Phase 19 (Wave 10 Session 3).

      - name: Deploy each bundle
        run: |
          set -euo pipefail
          BUNDLES=(
            tenants-api
            auth-api
            settings-api
            crm-api
            quotes-api
            projects-api
            ops-api
            invoicing-api
            finance-api
            vendors-api
            inventory-api
            dashboard-api
            exports-api
            imports-api
            # Phase 16 (Wave 10 Session 2) — B1 owns this block.
            collaboration-api
            # End Phase 16 (Wave 10 Session 2).
            # Wave 10 Session 2 — B2 (Phase 17 search-api)
            search-api
            # End Wave 10 Session 2 B2
            # Phase 19 (Wave 10 Session 3) — owns this block.
            pdf-worker
            notifications-worker
            # End Phase 19 (Wave 10 Session 3).
            # Phase 21 (Wave 10 Session 4) — C1 owns this block.
            customer-portal-api
            # End Phase 21 (Wave 10 Session 4).
          )
          for bundle in "${BUNDLES[@]}"; do
            echo "==> Deploying $bundle"
            supabase functions deploy "$bundle" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done
          echo "All ${#BUNDLES[@]} functions deployed."
