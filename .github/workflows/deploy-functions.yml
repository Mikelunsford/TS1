name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: supabase functions deploy
    runs-on: ubuntu-latest
    environment: production-functions
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 1.180.0

      - name: Set runtime secrets (idempotent)
        # SUPABASE_URL / SUPABASE_ANON_KEY / SUPABASE_SERVICE_ROLE_KEY are
        # auto-injected by the platform; we only need the custom ones.
        run: |
          supabase secrets set \
            ALLOWED_ORIGINS="${{ secrets.ALLOWED_ORIGINS }}" \
            --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"

      - name: Deploy each bundle
        run: |
          set -euo pipefail
          BUNDLES=(
            tenants-api
            auth-api
            settings-api
            crm-api
            quotes-api
            projects-api
            ops-api
            invoicing-api
            finance-api
            vendors-api
            inventory-api
            dashboard-api
            exports-api
          )
          for bundle in "${BUNDLES[@]}"; do
            echo "==> Deploying $bundle"
            supabase functions deploy "$bundle" --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}"
          done
          echo "All 13 functions deployed."
