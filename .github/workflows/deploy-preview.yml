name: Deploy preview (Vercel)

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    name: Vercel preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with: { version: 9.7.0 }

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install Vercel CLI
        run: pnpm dlx vercel@34 --version

      - name: Pull Vercel env
        run: pnpm dlx vercel@34 pull --yes --environment=preview --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: pnpm dlx vercel@34 build --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy preview
        id: deploy
        run: |
          url=$(pnpm dlx vercel@34 deploy --prebuilt --token "${{ secrets.VERCEL_TOKEN }}")
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 Preview deployed: ${url}`,
            });
