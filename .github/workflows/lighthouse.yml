name: Lighthouse CI

# Gated off by default. The action's Lighthouse runner can't reach Vercel
# previews while Deployment Protection is enabled (returns HTTP 401 → 404
# inside the auth redirect). Re-enable by setting the repo variable
# `LIGHTHOUSE_ENABLED` to `true` once Vercel preview protection is dropped
# (Vercel → ts-1 → Settings → Deployment Protection), OR after adding a
# Vercel "Protection Bypass for Automation" secret here and to the action.
# See R-W0-10 in 03-workspace/journal/2026-05-14-wave-0-closeout.md.

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse against preview
    if: vars.LIGHTHOUSE_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_NAME: Team1
          VITE_DEFAULT_TENANT_BRAND: team1
          VITE_BASE_DOMAIN: team1.app

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./apps/web/.lighthouserc.cjs
          uploadArtifacts: true
          temporaryPublicStorage: true
